spring:
  application:
    name: sd-savings-account

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  bian:
    serviceDomain: "Savings Account"
    businessArea: "Operations and Execution"
    businessDomain: "Account Management"
    functionalPattern: "Fulfill"
    assetType: "Savings Account Facility"
    controlRecord: "Savings Account Facility Fulfillment Arrangement"
    phase: "2a-deep"

bian:
  kyc:
    # Phase 2a: instant approval until the KYC choreography is live.
    auto-approve: true
  savings:
    # Classic savings-product rule; per-account override is a Phase 2b option.
    monthly-withdrawal-cap: 6

resilience4j:
  circuitbreaker:
    instances:
      serviceDomain:
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

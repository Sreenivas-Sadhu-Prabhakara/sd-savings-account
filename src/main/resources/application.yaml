spring:
  application:
    name: sd-savings-account

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  bian:
    serviceDomain: "Savings Account"
    businessArea: "Operations and Execution"
    businessDomain: "Account Management"
    functionalPattern: "Fulfill"
    assetType: "Savings Account Facility"
    controlRecord: "Savings Account Facility Fulfillment Arrangement"
    phase: "2a-deep"

bian:
  kyc:
    # Phase 2a: instant approval until the KYC choreography is live.
    auto-approve: true
  savings:
    # Classic savings-product rule; per-account override is a Phase 2b option.
    monthly-withdrawal-cap: 6

resilience4j:
  circuitbreaker:
    instances:
      serviceDomain:
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

---
# Profile 'kafka': real event transport (gate 2). Without it, events log.
spring:
  config:
    activate:
      on-profile: kafka
  kafka:
    bootstrap-servers: ${BIAN_KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
